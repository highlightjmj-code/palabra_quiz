<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페인어 마스터 - 200단어 퀴즈</title>
    <style>
        :root {
            --primary: #4A90E2; --success: #2ECC71; --error: #E74C3C;
            --bg: #F5F7FA; --dark: #2C3E50;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg); display: flex; justify-content: center;
            align-items: center; min-height: 100vh; margin: 0; color: var(--dark);
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 95%; max-width: 500px; text-align: center;
            max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none; }
        .question-text { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; color: var(--primary); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button {
            padding: 15px 10px; font-size: 1rem; border: 2px solid #EEE;
            border-radius: 12px; background: white; cursor: pointer; transition: all 0.2s; font-weight: 600;
        }
        button:hover:not(:disabled) { border-color: var(--primary); background-color: #F0F7FF; }
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        input {
            padding: 12px; width: 100%; margin-bottom: 10px; border: 1px solid #DDD;
            border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }
        .btn-main { background-color: var(--primary); color: white; border: none; width: 100%; margin-top: 10px; padding: 15px; font-weight: bold; }
        .btn-sub { background-color: #95a5a6; color: white; border: none; width: 100%; margin-top: 10px; padding: 12px; }
        
        /* 오답 노트 스타일 */
        .review-container { margin-top: 25px; text-align: left; border-top: 2px solid #EEE; padding-top: 20px; }
        .review-item { 
            padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem;
            border-left: 5px solid var(--error); background: #FFF5F5;
        }
        .review-word { font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .your-ans { color: var(--error); font-weight: bold; }
        .correct-ans { color: var(--success); font-weight: bold; }

        .ranking-item { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px solid #EEE; background: #fafafa; margin-bottom: 5px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 시작 화면 -->
        <div id="screen-start">
            <h1 style="font-size: 1.5rem;">🇪🇸 스페인어 기초 200단어</h1>
            <p>데이터베이스의 200단어 중 랜덤 10문제가 출제됩니다.</p>
            <button class="btn-main" onclick="startGame()">게임 시작</button>
            <div id="seed-area" class="hidden">
                <p style="font-size: 0.8rem; color: #e67e22; margin-top: 15px;">서버에 단어가 없습니다.</p>
                <button style="background:#f39c12; color:white; border:none; width:100%; padding:10px; border-radius:10px; cursor:pointer;" onclick="seedDefaultWords()">기초 단어 200개 채우기</button>
            </div>
        </div>

        <!-- 퀴즈 화면 -->
        <div id="screen-quiz" class="hidden">
            <div id="progress" style="color:#AAA; font-weight:bold; margin-bottom:10px;">1 / 10</div>
            <div class="question-text" id="question">?</div>
            <div class="options-grid" id="options"></div>
        </div>

        <!-- 결과 및 오답노트 화면 -->
        <div id="screen-result" class="hidden">
            <h1>퀴즈 종료!</h1>
            <p>내 점수: <strong id="final-score" style="font-size: 2rem; color: var(--primary);">0</strong>점</p>
            
            <input type="text" id="nickname" placeholder="랭킹용 닉네임 입력" maxlength="10">
            <button class="btn-main" id="btn-save-score">점수 저장 및 랭킹 보기</button>

            <div class="review-container">
                <h3 style="margin: 0 0 15px 0;">📝 오답 다시보기</h3>
                <div id="review-list"></div>
            </div>
            <button class="btn-sub" onclick="location.reload()">처음으로</button>
        </div>

        <!-- 랭킹 화면 -->
        <div id="screen-ranking" class="hidden">
            <h1>🏆 TOP 5 랭킹</h1>
            <ul id="ranking-board" style="list-style:none; padding:0; text-align:left;"></ul>
            <button class="btn-main" onclick="location.reload()">다시 도전하기</button>
            <button class="btn-sub" onclick="showAddWordScreen()">단어 직접 추가</button>
        </div>

        <!-- 단어 추가 화면 -->
        <div id="screen-add-word" class="hidden">
            <h1>단어 추가</h1>
            <input type="text" id="new-word" placeholder="스페인어 단어">
            <input type="text" id="new-answer" placeholder="뜻 (정답)">
            <p style="font-size:0.8rem; color:gray;">*오답은 시스템이 자동 생성합니다.</p>
            <button class="btn-main" id="btn-save-word">저장하기</button>
            <button class="btn-sub" onclick="showRanking()">취소</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // [사용자 Firebase 설정 적용]
        const firebaseConfig = {
            apiKey: "AIzaSyDfiEKEbT9AlL5Ff-iI4iB_DKUAQW4a-HI",
            authDomain: "palabra-quiz-game.firebaseapp.com",
            projectId: "palabra-quiz-game",
            storageBucket: "palabra-quiz-game.firebasestorage.app",
            messagingSenderId: "1097916767396",
            appId: "1:1097916767396:web:3c29ae54fb5fd36adc1a31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let quizData = [];
        let currentIdx = 0;
        let score = 0;
        let isProcessing = false;
        let sessionResults = [];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        async function checkData() {
            const snapshot = await getDocs(collection(db, "words"));
            if (snapshot.empty) document.getElementById('seed-area').classList.remove('hidden');
        }
        checkData();

        window.seedDefaultWords = async () => {
            const list = [

                ["Cerveza", "맥주"], ["Vino", "와인"], ["Comida", "음식"], ["Fruta", "과일"], ["Carne", "고기"],
                ["Pescado", "생선"], ["Huevo", "계란"], ["Arroz", "쌀/밥"], ["Sal", "소금"], ["Azúcar", "설탕"],
                ["Casa", "집"], ["Escuela", "학교"], ["Libro", "책"], ["Lápiz", "연필"], ["Mesa", "책상"],
                ["Silla", "의자"], ["Puerta", "문"], ["Ventana", "창문"], ["Cama", "침대"], ["Baño", "화장실"],
                ["Ropa", "옷"], ["Zapato", "신발"], ["Reloj", "시계"], ["Dinero", "돈"], ["Tarjeta", "카드"],
                ["Coche", "자동차"], ["Bicicleta", "자전거"], ["Avión", "비행기"], ["Tren", "기차"], ["Autobús", "버스"],
                ["Calle", "길"], ["Ciudad", "도시"], ["País", "나라"], ["Mundo", "세계"], ["Sol", "태양"],
                ["Luna", "달"], ["Estrella", "별"], ["Cielo", "하늘"], ["Mar", "바다"], ["Montaña", "산"],
                ["Flor", "꽃"], ["Árbol", "나무"], ["Perro", "개"], ["Gato", "고양이"], ["Pájaro", "새"],
                ["Hombre", "남자"], ["Mujer", "여자"], ["Niño", "아이"], ["Amigo", "친구"], ["Familia", "가족"],
                ["Padre", "아버지"], ["Madre", "어머니"], ["Hermano", "형제"], ["Hermana", "자매"], ["Abuelo", "할아버지"],
                ["Abuela", "할머니"], ["Hijo", "아들"], ["Hija", "딸"], ["Médico", "의사"], ["Profesor", "선생님"],
                ["Estudiante", "학생"], ["Trabajo", "일"], ["Tiempo", "시간/날씨"], ["Hoy", "오늘"], ["Mañana", "내일"],
                ["Ayer", "어제"], ["Ahora", "지금"], ["Después", "나중에"], ["Día", "낮"], ["Noche", "밤"],
                ["Semana", "주"], ["Mes", "달"], ["Año", "년"], ["Hora", "시"], ["Minuto", "분"],
                ["Lunes", "월요일"], ["Martes", "화요일"], ["Miércoles", "수요일"], ["Jueves", "목요일"], ["Viernes", "금요일"],
                ["Sábado", "토요일"], ["Domingo", "일요일"], ["Rojo", "빨간색"], ["Azul", "파란색"], ["Verde", "초록색"],
                ["Blanco", "하얀색"], ["Negro", "검은색"], ["Amarillo", "노란색"], ["Grande", "큰"], ["Pequeño", "작은"],
                ["Bueno", "좋은"], ["Malo", "나쁜"], ["Feliz", "행복한"], ["Triste", "슬픈"], ["Cansado", "피곤한"],
                ["Caliente", "뜨거운"], ["Frío", "차가운"], ["Mucho", "많은"], ["Poco", "적은"], ["Nuevo", "새로운"],
                ["Viejo", "오래된"], ["Rápido", "빠른"], ["Lento", "느린"], ["Fácil", "쉬운"], ["Difícil", "어려운"],
                ["Comer", "먹다"], ["Beber", "마시다"], ["Ir", "가다"], ["Venir", "오다"], ["Ver", "보다"],
                ["Hablar", "말하다"], ["Escuchar", "듣다"], ["Leer", "읽다"], ["Escribir", "쓰다"], ["Dormir", "자다"],
                ["Trabajar", "일하다"], ["Estudiar", "공부하다"], ["Comprar", "사다"], ["Vivir", "살다"], ["Tener", "가지다"],
                ["Querer", "원하다"], ["Saber", "알다"], ["Hacer", "하다"], ["Poder", "할 수 있다"], ["Dar", "주다"],
                ["Llamar", "부르다"], ["Preguntar", "묻다"], ["Cerrar", "닫다"], ["Abrir", "열다"], ["Cantar", "노래하다"],
                ["Bailar", "춤추다"], ["Viajar", "여행하다"], ["Ayudar", "돕다"], ["Buscar", "찾다"], ["Esperar", "기다리다"],
                ["Cabeza", "머리"], ["Mano", "손"], ["Pie", "발"], ["Ojo", "눈"], ["Boca", "입"],
                ["Corazón", "심장"], ["Cuerpo", "몸"], ["Salud", "건강"], ["Amor", "사랑"], ["Paz", "평화"],
                ["Derecha", "오른쪽"], ["Izquierda", "왼쪽"], ["Arriba", "위"], ["Abajo", "아래"], ["Cerca", "가까운"],
                ["Lejos", "먼"], ["Dentro", "안에"], ["Fuera", "밖에"], ["Primero", "첫 번째"], ["Último", "마지막"],
                ["Verano", "여름"], ["Invierno", "겨울"], ["Primavera", "봄"], ["Otoño", "가을"], ["Fruta", "과일"],
                ["Verdura", "채소"], ["Carne", "고기"], ["Pollo", "닭고기"], ["Sopa", "스프"], ["Ensalada", "샐러드"],
                ["Queso", "치즈"], ["Zumo", "주스"], ["Té", "차"], ["Cuchara", "숟가락"], ["Tenedor", "포크"],
                ["Cuchillo", "칼"], ["Plato", "접시"], ["Vaso", "컵"], ["Servilleta", "휴지"], ["Cocina", "주방"],
                ["Sala", "거실"], ["Jardín", "정원"], ["Pared", "벽"], ["Piso", "바닥"], ["Techo", "천장"],
                ["Papel", "종이"], ["Bolígrafo", "볼펜"], ["Silla", "의자"], ["Teléfono", "전화기"], ["Ordenador", "컴퓨터"],
                ["Internet", "인터넷"], ["Música", "음악"], ["Película", "영화"], ["Deporte", "운동"], ["Fútbol", "축구"],
                ["Uno", "1"], ["Dos", "2"], ["Tres", "3"], ["Diez", "10"], ["Cien", "100"]
            ];
            const batch = writeBatch(db);
            list.forEach(i => batch.set(doc(collection(db, "words")), { word: i[0], answer: i[1] }));
            await batch.commit();
            alert("서버에 200단어가 성공적으로 채워졌습니다!");
            location.reload();
        };

        window.startGame = async () => {
            const snap = await getDocs(collection(db, "words"));
            const allWords = [];
            snap.forEach(d => allWords.push(d.data()));
            if (allWords.length < 4) return alert("단어가 부족합니다. [기초 단어 채우기]를 먼저 눌러주세요.");

            const selected = shuffle(allWords).slice(0, 10);
            const allMeanings = allWords.map(w => w.answer);

            quizData = selected.map(item => ({
                ...item,
                wrongs: shuffle(allMeanings.filter(m => m !== item.answer)).slice(0, 3)
            }));

            currentIdx = 0; score = 0; sessionResults = [];
            showScreen('screen-quiz');
            loadQuestion();
        };

        function loadQuestion() {
            isProcessing = false;
            const data = quizData[currentIdx];
            document.getElementById('progress').innerText = `${currentIdx + 1} / 10`;
            document.getElementById('question').innerText = data.word;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            const choices = shuffle([data.answer, ...data.wrongs]);
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerText = choice;
                btn.onclick = () => checkAnswer(choice, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (isProcessing) return;
            isProcessing = true;
            const correct = quizData[currentIdx].answer;
            const isCorrect = (selected === correct);

            sessionResults.push({
                word: quizData[currentIdx].word,
                correct: correct,
                userPick: selected,
                isCorrect: isCorrect
            });

            if (isCorrect) { btn.classList.add('correct'); score += 10; }
            else { 
                btn.classList.add('wrong');
                Array.from(document.getElementById('options').children).forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < 10) loadQuestion();
                else renderFinalResult();
            }, 1000);
        }

        function renderFinalResult() {
            showScreen('screen-result');
            document.getElementById('final-score').innerText = score;
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';

            const wrongs = sessionResults.filter(r => !r.isCorrect);
            if (wrongs.length === 0) {
                reviewList.innerHTML = '<p style="color:var(--success); font-weight:bold;">Perfect! 모든 문제를 맞혔습니다! 👏</p>';
            } else {
                wrongs.forEach(item => {
                    reviewList.innerHTML += `
                        <div class="review-item">
                            <span class="review-word">${item.word}</span>
                            <span>내 선택: <span class="your-ans">${item.userPick}</span> / 정답: <span class="correct-ans">${item.correct}</span></span>
                        </div>`;
                });
            }
        }

        document.getElementById('btn-save-score').onclick = async () => {
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return alert("닉네임을 입력하세요!");
            try {
                await addDoc(collection(db, "scores"), { nickname: nick, score, timestamp: new Date() });
                loadRanking();
            } catch (e) { alert("저장 권한이 없습니다. Firestore Rules를 확인하세요."); }
        };

        async function loadRanking() {
            showScreen('screen-ranking');
            const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(5));
            const snap = await getDocs(q);
            const board = document.getElementById('ranking-board');
            board.innerHTML = '';
            let r = 1;
            snap.forEach(d => {
                const data = d.data();
                board.innerHTML += `<li class="ranking-item"><span>${r}. ${data.nickname}</span><strong>${data.score}점</strong></li>`;
                r++;
            });
        }
        window.showRanking = loadRanking;
        window.showAddWordScreen = () => showScreen('screen-add-word');

        document.getElementById('btn-save-word').onclick = async () => {
            const word = document.getElementById('new-word').value.trim();
            const answer = document.getElementById('new-answer').value.trim();
            if (!word || !answer) return alert("빈칸을 채워주세요!");
            await addDoc(collection(db, "words"), { word, answer });
            alert("단어가 추가되었습니다!");
            document.getElementById('new-word').value = '';
            document.get
